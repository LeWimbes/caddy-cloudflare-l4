name: Publish Docker image

on:
  schedule:
    - cron: "20 4 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/auto-build-on-change.yml

env:
  DOCKERHUB_REPO: lewimbes/caddy-cloudflare-l4
  GHCR_REPO: ghcr.io/${{ github.repository }}

jobs:
  check-updates:
    name: Check for base image updates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}
    steps:
      - name: Check if Caddy base image updated
        id: check
        uses: lucacome/docker-image-update-checker@3233adf42bb1dddf92f18cf024a8e202dbeaa9b3 # v3.1.0
        with:
          base-image: caddy:latest
          image: lewimbes/caddy-cloudflare-l4:latest

  build-and-push:
    name: Build and Push Docker image
    needs: check-updates
    # Run if it's a manual trigger, a code push, or if the update checker found a new base image
    if: github.event_name != 'schedule' || needs.check-updates.outputs.needs-updating == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Fetch Caddy version
        id: caddy
        shell: bash
        run: |
          set -euo pipefail
          url='https://raw.githubusercontent.com/docker-library/official-images/master/library/caddy'
          ver=$(curl -fsSL "$url" | grep -m1 '^Tags:' | \
              sed -E 's/Tags:[[:space:]]*([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          echo "full=$ver"                 >> "$GITHUB_OUTPUT"
          echo "major_minor=${ver%.*}"     >> "$GITHUB_OUTPUT"
          echo "major=${ver%%.*}"          >> "$GITHUB_OUTPUT"
          echo "Resolved Caddy version → $ver"

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            type=raw,value=${{ steps.caddy.outputs.full }}
            type=raw,value=${{ steps.caddy.outputs.major_minor }}
            type=raw,value=${{ steps.caddy.outputs.major }}
            type=raw,value=latest

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: |
            linux/amd64
            linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.GHCR_REPO }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
